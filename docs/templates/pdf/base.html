<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ volume_title }} - {{ project.project_name }}</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <section class="cover">
      <h1>{{ project.project_name }}</h1>
      <h2>{{ volume_title }}</h2>
      <p><strong>Version:</strong> {{ project.version }}</p>
      <p><strong>Status:</strong> {{ project.status }}</p>
      <p><strong>Revision date:</strong> {{ project.revision_date }}</p>
      <p class="notice">{{ safety_notice }}</p>
      <p class="notice">No fake stamps, fake signatures, construction approvals, or legally binding permits are included.</p>
    </section>
    <main>
      {{ body_html | safe }}
    </main>
  </body>
</html>
