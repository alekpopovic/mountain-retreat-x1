      - weather-protected outlets
    notes: Guard design and wind exposure require review.
  - code: TR-BBQ
    name: BBQ/outdoor kitchen
    area_m2: 12
    function: Outdoor cooking
    surface_finish: Non-combustible cooking zone finish
    guard_required: true
    utility_requirements:
      - power
      - water placeholder
      - drainage placeholder
    notes: Fire safety and plumbing require professional review.
  - code: TR-JAC
    name: Jacuzzi-ready zone
