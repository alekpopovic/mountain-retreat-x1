    name: Covered dining
    area_m2: 18
    function: Protected outdoor dining
    surface_finish: Exterior-rated timber or porcelain pavers
    guard_required: true
    utility_requirements:
      - lighting
      - weather-protected outlets
    notes: Roof/cover and snow drift effects require professional review.
  - code: TR-LOU
    name: Lounge
