code: premium_clt
name: Premium CLT/glulam
status: PRELIMINARY
description: >
  Prefabricated CLT/glulam concept with high coordination requirements,
  engineered panels, crane/logistics planning, and early opening/penetration
  decisions.
structural_concept_note: >
  Premium CLT/glulam can accelerate enclosure if panel procurement, transport,
  crane access, moisture protection, and engineering coordination are feasible.
  No panel thickness, lifting plan, or structural approval is generated.
quantity_reference: qty.clt.premium_clt
quantity_multiplier: 1.08
procurement_complexity: High; specialist CLT/glulam supplier, shop drawings, transport, and crane planning required.
self_build_difficulty: Very high; structural CLT/glulam assembly is not suitable for informal self-build work.
self_build_warnings:
  - Do not order CLT panels from generated quantities; panel design requires final shop drawings.
  - Crane access, lifting points, temporary bracing, and weather protection require specialist planning.
  - Penetrations and openings must be frozen only after licensed professional review.
risk_register:
  - id: VAR-CLT-001
    risk: Supplier lead times and shop drawing coordination may control the schedule.
    level: High
    mitigation: Add early procurement review, transport study, and design freeze milestones.
    professional_review_required: Architect, structural engineer, CLT supplier, and contractor.
  - id: VAR-CLT-002
    risk: CLT moisture exposure before dry-in can compromise quality.
    level: High
    mitigation: Require moisture protection plan, delivery sequencing, and inspection records.
    professional_review_required: Structural engineer and envelope specialist.
