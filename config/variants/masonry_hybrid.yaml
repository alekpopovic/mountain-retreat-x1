code: masonry_hybrid
name: Masonry hybrid
status: PRELIMINARY
description: >
  Masonry-heavy concept with reinforced concrete foundations, masonry wall
  placeholders, engineered lintels/ring beams, and hybrid roof/terrace support
  coordination.
structural_concept_note: >
  Masonry hybrid may use familiar trades and robust wall mass, but the heavier
  structure increases foundation, frost, moisture, and seismic coordination.
  No reinforcement, lintel, wall, or seismic detailing is approved.
quantity_reference: qty.masonry.blocks
quantity_multiplier: 1.05
procurement_complexity: Medium; common materials but higher engineering coordination for openings, seismic detailing, and foundations.
self_build_difficulty: High; structural masonry work requires qualified supervision and inspection hold points.
self_build_warnings:
  - Do not build structural masonry walls from generated block counts.
  - Lintels, ring beams, vertical reinforcement, anchorage, and seismic details require licensed engineering.
  - Thermal bridges, condensation, and waterproofing at terrace/foundation interfaces are high-risk.
risk_register:
  - id: VAR-MAS-001
    risk: Heavier walls may increase foundation and seismic design demand.
    level: High
    mitigation: Require geotechnical confirmation and structural seismic/foundation design.
    professional_review_required: Geotechnical professional and licensed structural engineer.
  - id: VAR-MAS-002
    risk: Thermal bridges and moisture paths at concrete/masonry interfaces.
    level: Medium
    mitigation: Coordinate insulation continuity, damp proofing, flashings, and drying strategy.
    professional_review_required: Architect, envelope specialist, and structural engineer.
